services:
  db:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:10001:11111"
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      - db

volumes:
  neo4j_data: